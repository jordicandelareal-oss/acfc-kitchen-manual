<!-- ── MODAL: PLANNER DAY EDIT ────────────────────────────────────── -->
<div id="modal-planner-day" class="modal-overlay hidden" onclick="if(event.target===this)closePlannerDayModal()">
  <div class="modal-box w-full max-w-2xl flex flex-col max-h-[90vh]">
    <div class="flex justify-between items-center mb-5 flex-shrink-0">
      <div>
        <h3 class="text-lg font-bold text-slate-900" style="font-family:Outfit">Planificar Día</h3>
        <p id="planner-day-date" class="text-sm text-slate-500 font-semibold"></p>
      </div>
      <button onclick="closePlannerDayModal()" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-colors"><span class="material-symbols-outlined">close</span></button>
    </div>
    <input type="hidden" id="planner-day-input" />
    
    <div class="flex-1 overflow-y-auto pr-2 space-y-6">
      
      <!-- BREAKFAST -->
      <div class="border border-slate-100 rounded-xl p-4 bg-slate-50/50">
        <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><span class="text-lg">☕</span> Desayuno</h4>
        <div class="cursor-pointer border-2 border-dashed border-slate-200 rounded-xl p-3 hover:border-brand hover:bg-brand-muted/10 transition-colors text-center" id="planner-breakfast-btn" onclick="openRecipeSelector('breakfast')">
          <span class="text-xs font-semibold text-brand">+ Asignar Receta</span>
        </div>
        <div id="planner-breakfast-card" class="hidden mt-2 flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
           <img id="planner-breakfast-img" src="" class="w-16 h-16 object-cover rounded-lg hidden" />
           <div class="flex-1">
             <p id="planner-breakfast-name" class="font-bold text-sm text-slate-800"></p>
           </div>
           <button onclick="clearPlannerRecipe('breakfast')" class="p-2 text-slate-400 hover:text-red-500"><span class="material-symbols-outlined text-sm">delete</span></button>
        </div>
      </div>

      <!-- LUNCH -->
      <div class="border border-slate-100 rounded-xl p-4 bg-slate-50/50">
        <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><span class="text-lg">🌞</span> Almuerzo</h4>
        <div class="cursor-pointer border-2 border-dashed border-slate-200 rounded-xl p-3 hover:border-brand hover:bg-brand-muted/10 transition-colors text-center" id="planner-lunch-btn" onclick="openRecipeSelector('lunch')">
          <span class="text-xs font-semibold text-brand">+ Asignar Receta</span>
        </div>
        <div id="planner-lunch-card" class="hidden mt-2 flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm mb-4">
           <img id="planner-lunch-img" src="" class="w-16 h-16 object-cover rounded-lg hidden" />
           <div class="flex-1">
             <p id="planner-lunch-name" class="font-bold text-sm text-slate-800"></p>
           </div>
           <button onclick="clearPlannerRecipe('lunch')" class="p-2 text-slate-400 hover:text-red-500"><span class="material-symbols-outlined text-sm">delete</span></button>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Comensales</label>
            <input type="number" id="planner-lunch-players" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Halal</label>
            <input type="number" id="planner-lunch-halal" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Kosher</label>
            <input type="number" id="planner-lunch-kosher" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Vegano</label>
            <input type="number" id="planner-lunch-vegan" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
        </div>
        <div class="mt-3">
          <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Alergias / Notas</label>
          <input type="text" id="planner-lunch-allergies" placeholder="Ej: 2 Celíacos, 1 Sin frutos secos" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
        </div>
      </div>

      <!-- DINNER -->
      <div class="border border-slate-100 rounded-xl p-4 bg-slate-50/50">
        <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><span class="text-lg">🌙</span> Cena</h4>
        <div class="cursor-pointer border-2 border-dashed border-slate-200 rounded-xl p-3 hover:border-brand hover:bg-brand-muted/10 transition-colors text-center" id="planner-dinner-btn" onclick="openRecipeSelector('dinner')">
          <span class="text-xs font-semibold text-brand">+ Asignar Receta</span>
        </div>
        <div id="planner-dinner-card" class="hidden mt-2 flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm mb-4">
           <img id="planner-dinner-img" src="" class="w-16 h-16 object-cover rounded-lg hidden" />
           <div class="flex-1">
             <p id="planner-dinner-name" class="font-bold text-sm text-slate-800"></p>
           </div>
           <button onclick="clearPlannerRecipe('dinner')" class="p-2 text-slate-400 hover:text-red-500"><span class="material-symbols-outlined text-sm">delete</span></button>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Comensales</label>
            <input type="number" id="planner-dinner-players" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Halal</label>
            <input type="number" id="planner-dinner-halal" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Kosher</label>
            <input type="number" id="planner-dinner-kosher" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Vegano</label>
            <input type="number" id="planner-dinner-vegan" value="0" min="0" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
          </div>
        </div>
        <div class="mt-3">
          <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Alergias / Notas</label>
          <input type="text" id="planner-dinner-allergies" placeholder="Ej: 2 Celíacos, 1 Sin frutos secos" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-white" />
        </div>
      </div>
      
    </div>
    
    <div class="mt-6 pt-4 border-t border-slate-100 flex justify-end gap-3 flex-shrink-0">
      <button onclick="closePlannerDayModal()" class="px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Cancelar</button>
      <button onclick="savePlannerDay()" id="planner-save-btn" class="px-6 py-2 text-sm font-semibold text-white bg-brand hover:bg-brand-dark rounded-lg shadow-sm transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px] hidden" id="planner-save-spinner" style="animation: spin 1s linear infinite;">progress_activity</span>
        <span id="planner-save-text">Guardar Día</span>
      </button>
    </div>
  </div>
</div>

<!-- ── MODAL: RECIPE SELECTOR ─────────────────────────────────────── -->
<div id="modal-recipe-selector" class="modal-overlay hidden z-[60]" onclick="if(event.target===this)closeRecipeSelector()">
  <div class="modal-box w-full max-w-3xl flex flex-col max-h-[90vh]">
    <div class="flex justify-between items-center mb-5 flex-shrink-0">
      <h3 class="text-lg font-bold text-slate-900" style="font-family:Outfit">Seleccionar Receta</h3>
      <button onclick="closeRecipeSelector()" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-colors"><span class="material-symbols-outlined">close</span></button>
    </div>
    
    <div class="mb-4">
      <input type="text" id="recipe-selector-search" onkeyup="filterRecipeSelector(this.value)" placeholder="Buscar por nombre o familia..." class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand" />
    </div>
    
    <div class="flex-1 overflow-y-auto pr-2 grid grid-cols-2 sm:grid-cols-3 gap-4" id="recipe-selector-grid">
      <!-- Populated via JS -->
    </div>
  </div>
</div>
